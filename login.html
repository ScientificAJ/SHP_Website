<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in – Student HackPad 2026</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav>
    <div class="logo">Student HackPad 2026</div>
    <ul>
      <li><a href="index.html">Overview</a></li>
      <li><a href="projects.html">Projects</a></li>
      <li><a href="rules.html">Rules</a></li>
      <li><a href="updates.html">Updates</a></li>
      <li><a href="discussions.html">Discussions</a></li>
    </ul>
    <div id="auth-container" class="auth-links"></div>
  </nav>

  <section>
    <form onsubmit="logIn(event)">
      <h2>Welcome back</h2>
      <div class="form-group">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" required>
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" required>
      </div>
      <button type="submit" class="btn-submit">Log in</button>
      <a href="signup.html" class="link">Don't have an account?  Sign up</a>
    </form>
  </section>

  <footer>
    <ul>
      <li><a href="index.html">Overview</a></li>
      <li><a href="projects.html">Projects</a></li>
      <li><a href="rules.html">Rules</a></li>
      <li><a href="updates.html">Updates</a></li>
      <li><a href="discussions.html">Discussions</a></li>
    </ul>
    <p>© 2026 Student HackPad – All rights reserved.</p>
  </footer>

  <script src="js/auth.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
